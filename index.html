<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 面试题集</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root {
        --site-max-width: 1400px;
        --left-width: 260px;
        --right-width: 260px;
      }

      .app-name-link img {
        max-width: 42px;
      }

      .markdown-section {
        max-width: 860px;
      }

      .content {
        left: var(--left-width);
        right: var(--right-width);
      }

      .sidebar {
        width: var(--left-width);
      }

      .toc-nav {
        position: fixed;
        top: 0;
        right: 0;
        width: var(--right-width);
        height: 100vh;
        overflow-y: auto;
        padding: 72px 16px 16px;
        border-left: 1px solid #e5e7eb;
        background: #ffffff;
        z-index: 10;
      }

      .toc-nav > p {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
        color: #111827;
      }

      .toc-nav ul {
        margin: 0;
        padding-left: 0;
        list-style: none;
      }

      .toc-nav li a {
        display: block;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 14px;
        color: #374151;
      }

      .toc-nav li a:hover {
        color: #1d4ed8;
        background: #eef2ff;
        text-decoration: none;
      }

      .toc-nav .active > a {
        color: #1d4ed8;
        background: #eef2ff;
      }

      .toc-nav ul ul li a {
        padding-left: 18px;
        color: #6b7280;
      }

      @media (max-width: 1200px) {
        :root {
          --left-width: 220px;
          --right-width: 220px;
        }
      }

      @media (max-width: 960px) {
        .content {
          right: 0;
        }

        .toc-nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">加载中...</div>
    <script>
      window.$docsify = {
        name: "Agent 面试题集",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 2,
        homepage: "目录.md",
        auto2top: true,
        search: "auto",
        toc: {
          tocMaxLevel: 3,
          target: "h2, h3",
          ignoreHeaders: ["目录", "Catalog"]
        }
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
  </body>
</html>
